```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QA Officer Dashboard</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f7fb;
margin:0;
}

header{
background:#0f172a;
color:white;
padding:16px 24px;
font-size:18px;
font-weight:600;
}

nav{
background:white;
padding:10px;
display:flex;
gap:10px;
border-bottom:1px solid #eee;
}

nav button{
background:#e2e8f0;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

nav button.active{
background:#2563eb;
color:white;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 14px rgba(0,0,0,.06);
margin-bottom:20px;
}

.week-row{
display:grid;
grid-template-columns:80px 1fr 120px;
gap:20px;
padding:12px 0;
border-bottom:1px solid #eee;
align-items:center;
}

.week-badge{
background:#f1f5f9;
padding:8px;
border-radius:8px;
text-align:center;
}

.week-badge.done{background:#dcfce7;}
.week-badge.skipped{background:#fee2e2;}

.chip{
padding:6px 12px;
border-radius:20px;
font-size:12px;
}

.green{background:#dcfce7;}
.red{background:#fee2e2;}
.orange{background:#fef3c7;}
.gray{background:#e5e7eb;}

input,select{
padding:8px;
border:1px solid #ddd;
border-radius:6px;
margin:5px;
}

button{
padding:8px 14px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

.course{
padding:12px;
border:1px solid #eee;
border-radius:8px;
margin-bottom:8px;
cursor:pointer;
}

.course:hover{
background:#f8fafc;
}

</style>

</head>

<body>

<header>QA Officer Dashboard</header>

<nav>
<button onclick="showTab('dashboard',this)" class="active">Dashboard</button>
<button onclick="showTab('courses',this)">Courses</button>
<button onclick="showTab('tracker',this)">Tracker</button>
</nav>

<div class="container">

<div id="dashboard"></div>
<div id="courses" style="display:none"></div>
<div id="tracker" style="display:none"></div>

</div>

<script>

/* Storage */

function load(k){
return JSON.parse(localStorage.getItem(k)||"[]")
}

function save(k,v){
localStorage.setItem(k,JSON.stringify(v))
}

/* Navigation */

function showTab(id,btn){

document.querySelectorAll(".container > div")
.forEach(d=>d.style.display="none")

document.getElementById(id).style.display="block"

document.querySelectorAll("nav button")
.forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

render()

}

/* Courses */

function addCourse(){

const courses = load("courses")

courses.push({
id:Date.now(),
name:document.getElementById("course-name").value
})

save("courses",courses)

render()

}

let selectedCourse=null

function selectCourse(id){

selectedCourse=id
showTab("tracker",document.querySelectorAll("nav button")[2])

}

/* Add Log */

function addLog(){

const logs=load("logs")

logs.push({
course:selectedCourse,
week:Number(document.getElementById("week").value),
topic:document.getElementById("topic").value,
coverage:document.getElementById("coverage").value
})

save("logs",logs)

render()

}

/* Chip */

function chip(t){

const map={
covered:"chip green",
partial:"chip orange",
skipped:"chip red"
}

return `<span class="${map[t]||"chip gray"}">${t||"pending"}</span>`

}

/* Dashboard */

function renderDashboard(){

const courses=load("courses")
const logs=load("logs")

document.getElementById("dashboard").innerHTML=`

<div class="card">
<h3>Dashboard Overview</h3>

Total Courses: ${courses.length}<br>
Total Sessions Logged: ${logs.length}

</div>

`

}

/* Courses */

function renderCourses(){

const courses=load("courses")

document.getElementById("courses").innerHTML=`

<div class="card">
<h3>Add Course</h3>

<input id="course-name" placeholder="Course Name">
<button onclick="addCourse()">Add</button>

</div>

<div class="card">

<h3>Course List</h3>

${courses.map(c=>

`<div class="course" onclick="selectCourse(${c.id})">
${c.name}
</div>`

).join("")}

</div>

`

}

/* Tracker */

function renderTracker(){

if(!selectedCourse){
document.getElementById("tracker").innerHTML=
`<div class="card">Select Course First</div>`
return
}

const logs=load("logs")
.filter(l=>l.course===selectedCourse)

const weeks=Array.from({length:17},(_,i)=>i+1)

document.getElementById("tracker").innerHTML=`

<div class="card">

<h3>Add Session</h3>

<input id="week" placeholder="Week">
<input id="topic" placeholder="Topic">

<select id="coverage">
<option value="covered">Covered</option>
<option value="partial">Partial</option>
<option value="skipped">Skipped</option>
</select>

<button onclick="addLog()">Add</button>

</div>

<div class="card">

<h3>Week Tracker</h3>

${weeks.map(w=>{

const last=logs.filter(l=>l.week===w).pop()

let badge="week-badge"

if(last){
if(last.coverage==="covered") badge+=" done"
if(last.coverage==="skipped") badge+=" skipped"
}

return `

<div class="week-row">

<div class="${badge}">
Week ${w}
</div>

<div>
${last?last.topic:"No Log"}
</div>

<div>
${chip(last?.coverage)}
</div>

</div>

`

}).join("")}

</div>

`

}

/* Render */

function render(){

renderDashboard()
renderCourses()
renderTracker()

}

render()

</script>

</body>
</html>
```
