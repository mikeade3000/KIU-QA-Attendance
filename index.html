```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QA Officer Teaching Tracker</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f7fb;
margin:0;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 14px rgba(0,0,0,.06);
margin-bottom:20px;
}

.card-title{
font-size:18px;
font-weight:600;
margin-bottom:15px;
}

.week-row{
display:grid;
grid-template-columns:80px 1fr 140px;
gap:20px;
padding:12px 0;
border-bottom:1px solid #eee;
align-items:center;
}

.week-badge{
background:#f1f5f9;
padding:8px;
border-radius:8px;
text-align:center;
}

.week-badge.done{
background:#dcfce7;
}

.week-badge.skipped{
background:#fee2e2;
}

.week-badge.current{
background:#e0f2fe;
}

.wk{
font-size:12px;
color:#666;
}

.wn{
font-size:18px;
font-weight:600;
}

.topic-title{
font-weight:600;
margin-bottom:4px;
}

.topic-plan{
color:#666;
font-size:13px;
}

.topic-note{
font-size:13px;
margin-top:4px;
}

.chip{
padding:6px 12px;
border-radius:20px;
font-size:12px;
text-transform:capitalize;
}

.green{background:#dcfce7;}
.red{background:#fee2e2;}
.orange{background:#fef3c7;}
.gray{background:#e5e7eb;}

input,select{
padding:8px;
margin:5px;
border-radius:6px;
border:1px solid #ddd;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

</style>
</head>

<body>

<div class="card">
<div class="card-title">Add Session Log</div>

<input id="week" placeholder="Week" type="number">
<input id="topic" placeholder="Topic">
<select id="coverage">
<option value="covered">Covered</option>
<option value="partial">Partial</option>
<option value="skipped">Skipped</option>
</select>

<input id="notes" placeholder="Notes">
<button onclick="addLog()">Add</button>

</div>


<div id="qa-topic-body"></div>



<script>

/* ========================
Storage Helpers
======================== */

function load(key){
return JSON.parse(localStorage.getItem(key)||"[]")
}

function save(key,val){
localStorage.setItem(key,JSON.stringify(val))
}


/* ========================
Add Session Log
======================== */

function addLog(){

const logs = load('qa_session_logs')

logs.push({

week:Number(document.getElementById('week').value),
topic:document.getElementById('topic').value,
coverage:document.getElementById('coverage').value,
notes:document.getElementById('notes').value

})

save('qa_session_logs',logs)

render()

}


/* ========================
Sample Syllabus
======================== */

const syllabus = [

{week:1,topic:"Introduction",desc:"Course overview"},
{week:2,topic:"Variables",desc:"Basics"},
{week:3,topic:"Functions",desc:"JS functions"},
{week:4,topic:"Arrays"},
{week:5,topic:"Objects"},
{week:6,topic:"DOM"},
{week:7,topic:"Events"},
{week:8,topic:"API"},
{week:9,topic:"Project"},
{week:10,topic:"Revision"},
{week:11,topic:"Assessment"},
{week:12,topic:"Advanced"},
{week:13,topic:"Testing"},
{week:14,topic:"Deployment"},
{week:15,topic:"Review"},
{week:16,topic:"Project"},
{week:17,topic:"Final"}

]


/* ========================
Current Week
======================== */

function getCurrentWeek(){

const start = new Date("2025-01-01")
const now = new Date()

const diff = now-start

return Math.floor(diff/(1000*60*60*24*7))+1

}


/* ========================
Chip
======================== */

function chip(type){

const map={
covered:"chip green",
skipped:"chip red",
partial:"chip orange",
"not-covered":"chip gray"
}

return `<span class="${map[type]}">${type}</span>`

}


/* ========================
Render UI
======================== */

function render(){

const logs = load('qa_session_logs')

const weeks = Array.from({length:17},(_,i)=>i+1)

document.getElementById("qa-topic-body").innerHTML=

`

<div class="card">

<div class="card-title">
Week-by-Week Syllabus vs Teaching Log
</div>

${weeks.map(w=>{

const plan = syllabus.find(p=>p.week===w)
const lastLog = logs.filter(l=>l.week===w).pop()

let badge="week-badge"

if(lastLog){

if(lastLog.coverage==="covered") badge+=" done"
else if(lastLog.coverage==="skipped") badge+=" skipped"
else badge+=" current"

}

return `

<div class="week-row">

<div class="${badge}">
<div class="wk">Wk</div>
<div class="wn">${w}</div>
</div>

<div>

<div class="topic-title">
${plan?plan.topic:"Week "+w}
</div>

${plan?.desc?
`<div class="topic-plan">📋 ${plan.desc}</div>`:""
}

${lastLog?

`

<div class="topic-note">

${lastLog.coverage==="covered"?"✔ Covered":
lastLog.coverage==="partial"?"⚡ Partial":
"✗ Skipped"}

${lastLog.notes?" • "+lastLog.notes:""}

</div>

`

:

`<div class="topic-note">No session log</div>`

}

</div>

<div>

${lastLog?chip(lastLog.coverage):chip("not-covered")}

</div>

</div>

`

}).join("")}

</div>

`

}


render()

</script>

</body>
</html>
```
